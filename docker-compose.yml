version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: narishield
      POSTGRES_PASSWORD: narishield
      POSTGRES_DB: narishield
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: narishield
      MINIO_ROOT_PASSWORD: narishield123
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  pg_data:
